<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Radar</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg-card: #f8f9fa;
            --text: #1a1a1a;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --bg-card: #1e293b;
                --text: #f1f5f9;
                --text-secondary: #94a3b8;
                --border: #334155;
                --accent: #60a5fa;
                --accent-hover: #93bbfd;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 16px;
        }
        header {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }
        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
        }
        .section-header {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 16px;
            padding: 10px 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-header .count {
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-secondary);
        }
        .section-claude .section-header {
            background: linear-gradient(135deg, #d9764815, #e8956a15);
            border-left: 4px solid #d97648;
        }
        .section-international .section-header {
            background: linear-gradient(135deg, #2563eb15, #60a5fa15);
            border-left: 4px solid #2563eb;
        }
        .section-domestic .section-header {
            background: linear-gradient(135deg, #dc262615, #f8717115);
            border-left: 4px solid #dc2626;
        }
        .section {
            margin-bottom: 40px;
        }
        .date-group {
            margin-bottom: 24px;
        }
        .date-header {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .card:hover {
            border-color: var(--accent);
        }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .card-title a {
            color: var(--accent);
            text-decoration: none;
        }
        .card-title a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }
        .card-original-title {
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-style: italic;
            margin-bottom: 4px;
        }
        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
            background: var(--accent);
            color: #fff;
        }
        .badge-techcrunch { background: #0a9e01; }
        .badge-verge { background: #e6007a; }
        .badge-mit { background: #7c3aed; }
        .badge-openai { background: #000; }
        .badge-google { background: #4285f4; }
        .badge-venturebeat { background: #e67e22; }
        .badge-ars { background: #ff4c00; }
        .badge-itmedia { background: #0068b7; }
        .badge-aischolar { background: #1e88e5; }
        .badge-gigazine { background: #333; }
        .badge-pcwatch { background: #00838f; }
        .badge-changelog { background: #d97648; }
        .badge-anthropic { background: #d97648; }
        .card-time {
            color: var(--text-secondary);
        }
        .card-summary {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .empty {
            text-align: center;
            padding: 48px 16px;
            color: var(--text-secondary);
        }
        footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI News Radar</h1>
            <p>0 articles &middot; Updated 2026-04-12 05:50 UTC</p>
        </header>

        

        

        
            <div class="empty">
                <p>No new articles found.</p>
            </div>
        

        <footer>
            AI News Radar &mdash; Powered by RSS feeds
        </footer>
    </div>
</body>
</html>
